<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7B1515"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="200" height="200" rx="28" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="6" y="6" width="188" height="188" rx="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Connectivity arc (signal waves above car) -->
  <g fill="none" stroke="white" stroke-linecap="round" opacity="0.6">
    <path d="M100 56 m-22-10 a26 26 0 0 1 44 0" stroke-width="3"/>
    <path d="M100 56 m-14-6  a16 16 0 0 1 28 0" stroke-width="2.5"/>
    <path d="M100 56 m-6-3   a8  8  0 0 1 12 0" stroke-width="2"/>
  </g>
  <!-- Dot at bottom of signal -->
  <circle cx="100" cy="57" r="3.5" fill="white" opacity="0.9"/>

  <!-- Car silhouette -->
  <g filter="url(#shadow)">
    <!-- Car roof -->
    <path d="M62 104 C68 86 80 80 100 79 C120 80 132 86 138 104 Z"
          fill="url(#carGrad)"/>
    <!-- Car body -->
    <rect x="48" y="104" width="104" height="26" rx="5" fill="url(#carGrad)"/>
    <!-- Windshield cutout (dark) -->
    <path d="M70 102 C74 89 84 83 100 82 C116 83 126 89 130 102 Z"
          fill="rgba(0,0,0,0.15)"/>
    <!-- Wheel arches -->
    <path d="M48 126 Q48 130 52 130 L74 130 Q82 130 82 122 L82 118 L48 118 Z"
          fill="url(#carGrad)"/>
    <path d="M152 126 Q152 130 148 130 L126 130 Q118 130 118 122 L118 118 L152 118 Z"
          fill="url(#carGrad)"/>
    <!-- Tyres -->
    <circle cx="70"  cy="130" r="13" fill="#2C2C2C"/>
    <circle cx="130" cy="130" r="13" fill="#2C2C2C"/>
    <!-- Tyre highlights -->
    <circle cx="70"  cy="130" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="130" cy="130" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <!-- Wheel centre -->
    <circle cx="70"  cy="130" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="130" cy="130" r="3" fill="rgba(255,255,255,0.5)"/>
    <!-- Door line -->
    <line x1="100" y1="104" x2="100" y2="128" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <!-- Headlights -->
    <rect x="50" y="109" width="14" height="6" rx="3" fill="rgba(255,240,150,0.75)"/>
    <rect x="136" y="109" width="14" height="6" rx="3" fill="rgba(255,100,80,0.75)"/>
  </g>

  <!-- Divider line -->
  <line x1="30" y1="154" x2="170" y2="154" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Text: POSSETH -->
  <text x="100" y="170"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="16"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="2">POSSETH</text>

  <!-- Text: TOYOTA CLIENT -->
  <text x="100" y="186"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="10"
        fill="rgba(255,255,255,0.75)"
        text-anchor="middle"
        letter-spacing="3">TOYOTA CLIENT</text>
</svg>
